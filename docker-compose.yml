version: '3.8'

services:
  mcp-db-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-db-server
    ports:
      - "${SERVER_PORT:-8088}:8088"
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - mcp-network

  # ========== 示例：MySQL 数据库（供客户端连接测试）==========
  mysql-demo:
    image: mysql:8.0
    container_name: mcp-mysql-demo
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mcp_demo}
      MYSQL_USER: ${MYSQL_USER:-mcpserver}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mcpserver123}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mcp-network

volumes:
  mysql-data:

networks:
  mcp-network:
    driver: bridge
